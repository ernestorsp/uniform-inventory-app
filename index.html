<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#1f9aaa">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="AAIX Uniforms">
  <meta name="application-name" content="AAIX Uniforms">
  <link rel="icon" type="image/png" sizes="512x512" href="aaix-uniform-logo.png">
  <link rel="shortcut icon" type="image/png" href="aaix-uniform-logo.png">
  <link rel="apple-touch-icon" href="aaix-uniform-logo.png">
  <link rel="manifest" href="manifest.webmanifest">
  <title>AAIX Uniform Inventory</title>
  <style>
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#f4f7fa}
    iframe{display:block;width:100%;height:100%;border:0;background:#f4f7fa;opacity:0;transition:opacity .25s ease}
    iframe.ready{opacity:1}
    .splash{position:fixed;inset:0;z-index:10;display:grid;place-items:center;background:linear-gradient(145deg,#173f5f,#1f9aaa);transition:opacity .3s ease,visibility .3s ease}
    .splash.hide{opacity:0;visibility:hidden}
    .splashBox{text-align:center;color:#fff;font-family:Arial,sans-serif}
    .splashLogo{width:132px;height:132px;border-radius:28px;box-shadow:0 16px 38px #09284255}
    .splash h1{margin:20px 0 8px;font-size:25px}
    .splash p{margin:0 0 18px;opacity:.85}
    .spinner{width:34px;height:34px;margin:auto;border:4px solid #ffffff55;border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .fallback{position:fixed;inset:auto 16px 16px;z-index:2;text-align:center;font:14px Arial,sans-serif}
    .fallback a{color:#173f5f}
  </style>
</head>
<body>
  <div id="splash" class="splash" role="status" aria-live="polite">
    <div class="splashBox">
      <img class="splashLogo" src="aaix-uniform-logo.png" alt="AAIX">
      <h1>AAIX Uniform Inventory</h1>
      <p>Loading your workspace…</p>
      <div class="spinner" aria-hidden="true"></div>
    </div>
  </div>
  <iframe
    src="https://script.google.com/macros/s/AKfycbzzJ8xUr4c3qrGBGAKbAWVV-QHUb3oLcYTi2809KnMTj3S4aiIOUsBrilDl0fHO8_l8/exec"
    title="AAIX Uniform Inventory"
    allow="clipboard-write"
  ></iframe>
  <script>
    const TOKEN_KEY='aaix_uniform_token';
    window.addEventListener('message',event=>{
      const fromGoogle=event.origin==='https://script.google.com'||event.origin.endsWith('.googleusercontent.com');
      if(!fromGoogle||!event.data)return;
      if(event.data.type==='aaix-app-ready'){
        document.querySelector('iframe').classList.add('ready');
        document.getElementById('splash').classList.add('hide');
      }else if(event.data.type==='aaix-token-request'){
        event.source.postMessage({type:'aaix-token-response',token:localStorage.getItem(TOKEN_KEY)||''},event.origin);
      }else if(event.data.type==='aaix-token-save'){
        event.data.token?localStorage.setItem(TOKEN_KEY,event.data.token):localStorage.removeItem(TOKEN_KEY);
      }
    });
    setTimeout(()=>{
      document.querySelector('iframe').classList.add('ready');
      document.getElementById('splash').classList.add('hide');
    },20000);
  </script>
  <noscript class="fallback">
    <a href="https://script.google.com/macros/s/AKfycbzdMMYavvMVwx5YU1iQRA7BKZ9W_Yab2RwnYeeRoiX97ihaevdcipSsx4jXq8ei4cvv/exec">Open AAIX Uniform Inventory</a>
  </noscript>
</body>
</html>
